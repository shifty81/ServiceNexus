version: '3.8'

services:
  servicenexus:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set for production}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - TRUST_PROXY=true
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
    volumes:
      - servicenexus-data:/app/data
      - servicenexus-uploads:/app/uploads
    restart: unless-stopped

volumes:
  servicenexus-data:
  servicenexus-uploads:
